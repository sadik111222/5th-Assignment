<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./home.html">

    <link rel="icon" href="./assets/github-logo.png">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Issues Tracker</title>

</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center">
    <div id="login-page" class="min-h-screen flex items-center justify-center ">
        <div class="bg-white p-8 rounded-lg shadow-md md:w-96 text-center">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-14 mx-auto mb-6">
            <h1 class="text-2xl font-bold text-gray-900 mb-2">GitHub Issues Tracker</h1>
            <p class="text-gray-500 mb-8">Sign in to manage your issues</p>
            
            <div class="text-left mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" placeholder="Username" value="admin" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <p class="text-xs text-gray-500 mt-1">Default: admin</p>
            </div>
            
            <div class="text-left mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Password" value="admin123" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <p class="text-xs text-gray-500 mt-1">Default: admin123</p>
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-[#4A00FF] text-white p-3 rounded-lg hover:bg-purple-800 cursor-pointer transition font-medium">Sign In</button>
            
            <div class="mt-6 text-center">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">OR</span>
                    </div>
                </div>
                
                <button class="w-25 mt-4 bg-[#5c4b88] text-white p-3 rounded-lg hover:bg-purple-800 cursor-pointer transition font-medium">Sign Up</button>
            </div>
        </div>
    </div>
    
    <div id="mainPage" class="hidden w-full min-h-screen bg-gray-50">
        <!-- Navbar -->
        <nav class="bg-white shadow-sm border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <!-- Logo/Name -->
                    <div class="flex items-center">
                        <i class="fab fa-github text-2xl text-gray-800 mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-800">GitHub Issues Tracker</h1>
                    </div>
                    
                    <!-- Search and New Issue Button -->
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <input 
                                type="text" 
                                id="searchInput"
                                placeholder="Search issues..." 
                                class="w-64 px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none"
                            >
                            <button 
                                id="searchBtn"
                                class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-purple-600"
                            >
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                        <button 
                            id="newIssueBtn"
                            class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition duration-200 flex items-center"
                        >
                            <i class="fas fa-plus mr-2"></i>
                            New Issue
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
           
            <div class="bg-white rounded-lg shadow-sm mb-6">
               
                <div class="flex space-x-1 p-1">
                    <button 
                        class="tab-btn flex-1 py-2 px-4 rounded-lg font-medium transition duration-200 tab-active"
                        data-tab="all"
                    >
                        All
                    </button>
                    <button 
                        class="tab-btn flex-1 py-2 px-4 rounded-lg font-medium transition duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200"
                        data-tab="open"
                    >
                        Open
                    </button>
                    <button 
                        class="tab-btn flex-1 py-2 px-4 rounded-lg font-medium transition duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200"
                        data-tab="closed"
                    >
                        Closed
                    </button>
                </div>
                
                
                <div class="px-6 py-4 border-t border-gray-200">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <i class="fas fa-exclamation-circle text-gray-400 text-xl"></i>
                            <div>
                                <h2 class="text-lg font-semibold text-gray-800">
                                    <span id="issueCount">0</span> Issues
                                </h2>
                                <p class="text-sm text-gray-600">Track and manage your project issues</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="flex items-center">
                                <div class="w-3 h-3 bg-green-500 rounded-full mr-2"></div>
                                <span class="text-sm text-gray-600">Open</span>
                            </div>
                            <div class="flex items-center">
                                <div class="w-3 h-3 bg-purple-500 rounded-full mr-2"></div>
                                <span class="text-sm text-gray-600">Closed</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

           
            <div id="loadingSpinner" class="flex justify-center items-center py-12 hidden">
                <div class="loading-spinner"></div>
            </div>

            
            <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                
            </div>
        </div>
    </div>

    <!-- Issue Modal -->
    <div id="issueModal" class="modal">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6">
               
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modalTitle" class="text-xl font-bold text-gray-800"></h2>
                    <button 
                        id="closeModal"
                        class="text-gray-400 hover:text-gray-600"
                    >
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
               
                <div class="space-y-4">
                    <div class="flex items-center space-x-4">
                        <span id="modalStatus" class="px-3 py-1 rounded-full text-sm font-medium"></span>
                        <span id="modalPriority" class="px-3 py-1 rounded-full text-sm font-medium"></span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <span class="font-medium text-gray-700">Opened by:</span>
                            <span id="modalAuthor" class="text-gray-600 ml-2"></span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700">Created:</span>
                            <span id="modalDate" class="text-gray-600 ml-2"></span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700">Assignee:</span>
                            <span id="modalAssignee" class="text-gray-600 ml-2"></span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700">Issue #:</span>
                            <span id="modalNumber" class="text-gray-600 ml-2"></span>
                        </div>
                    </div>
                    
                    <div>
                        <h3 class="font-medium text-gray-700 mb-2">Description</h3>
                        <p id="modalDescription" class="text-gray-600"></p>
                    </div>
                    
                    <div>
                        <h3 class="font-medium text-gray-700 mb-2">Labels</h3>
                        <div id="modalLabels" class="flex flex-wrap gap-2">
                            <!-- Labels will be added dynamically -->
                        </div>
                    </div>
                </div>
                
                
                <div class="mt-6 flex justify-end">
                    <button 
                        id="modalCloseBtn"
                        class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-300 transition duration-200"
                    >
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
